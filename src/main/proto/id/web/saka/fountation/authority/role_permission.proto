syntax = "proto3";

package authorization;

option java_package = "id.web.saka.fountation.authority";
option java_outer_classname = "RolePermissionProto";
option java_multiple_files = true;

// Nested message for Permission
message Permission {
  string permission_name = 1; // matches your Java Permission.name
}

// Main DTO
message RolePermission {
  int64 role_id = 1;
  string role_name = 2;
  string role_description = 3;
  repeated Permission permissions = 4; // List of Permission
}

// Request message for fetching role permissions
message GetRolePermissionRequest {
  int64 company_id = 1;
  int64 user_id = 2;
}

// gRPC service definition
service AuthorizationService {
  rpc GetRolePermission (GetRolePermissionRequest) returns (RolePermission);
}